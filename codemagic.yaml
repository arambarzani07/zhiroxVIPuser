workflows:
  android-apk:
    name: ZHIROX Android APK
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - flutter --version
      - flutter clean
      - flutter pub get
      - flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/logs/*.log

  ios-build-check-no-codesign:
    name: ZHIROX iOS Build Check without signing
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - flutter --version
      - flutter clean
      - flutter pub get
      - cd ios && pod install && cd ..
      - flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/Runner.app
      - /tmp/xcodebuild_logs/*.log

  ios-signed-ipa:
    name: ZHIROX Signed IPA
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.karoxghafoor.zhirox
    scripts:
      - flutter --version
      - flutter clean
      - flutter pub get
      - cd ios && pod install && cd ..
      # Configure Apple Developer / App Store Connect signing in Codemagic before running this workflow.
      - flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
