name: Password Cleanup Phase 1

on:
  workflow_dispatch:
  push:
    branches:
      - Dev
    paths:
      - tool/password_cleanup_phase1.dart
      - .github/workflows/password-cleanup-phase1.yml

permissions:
  contents: write

jobs:
  apply-password-cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Dev
        uses: actions/checkout@v4
        with:
          ref: Dev
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Apply password cleanup phase 1
        run: dart run tool/password_cleanup_phase1.dart

      - name: Format changed Dart files
        run: dart format lib/services/pb_service.dart lib/screens/shared/user_profile_screen.dart tool/password_cleanup_phase1.dart

      - name: Analyze project
        run: flutter analyze

      - name: Commit cleanup changes
        run: |
          if git diff --quiet; then
            echo "No cleanup changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/services/pb_service.dart lib/screens/shared/user_profile_screen.dart tool/password_cleanup_phase1.dart
          git commit -m "Apply password cleanup phase 1"
          git push origin Dev
