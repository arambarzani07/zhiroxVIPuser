[build]
  command = "if [ ! -f \"$HOME/flutter/bin/flutter\" ]; then rm -rf \"$HOME/flutter\" && git clone https://github.com/flutter/flutter.git -b stable --depth 1 $HOME/flutter; fi && export PATH=\"$HOME/flutter/bin:$PATH\" && flutter config --enable-web && flutter create . --platforms web && flutter pub get && flutter build web --release"
  publish = "build/web"
